<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ（プロトタイプ）- 房州ガス</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://boushugas.co.jp/wp2026/wp-content/themes/boshugas/css/style.css?ver=1771989191">
    <link rel="stylesheet" href="css/override.css">
    <style>
        .prototype-badge {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #e74c3c;
            color: #fff;
            text-align: center;
            padding: 4px;
            font-size: 12px;
            font-weight: 700;
            z-index: 99999
        }

        body {
            padding-top: 28px;
            font-family: "Noto Sans JP", sans-serif;
            font-size: 16px;
            color: #333;
            line-height: 1.8
        }

        .proto-header {
            background: #0068b7;
            padding: 16px 0
        }

        .proto-header__inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px
        }

        .proto-header__logo {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            text-decoration: none
        }

        .proto-header__nav {
            display: flex;
            gap: 20px
        }

        .proto-header__nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px
        }

        .breadcrumb {
            max-width: 1100px;
            margin: 16px auto;
            padding: 0 20px;
            font-size: 13px;
            color: #888
        }

        .breadcrumb a {
            color: #0068b7;
            text-decoration: none
        }

        .page-title-area {
            max-width: 1100px;
            margin: 0 auto 40px;
            padding: 0 20px
        }

        .page-title-area h1 {
            font-size: 28px;
            font-weight: 700;
            padding-bottom: 12px;
            border-bottom: 3px solid #0068b7;
            display: inline-block
        }

        .content-area {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px
        }

        .section-heading {
            font-size: 20px;
            font-weight: 700;
            padding-left: 16px;
            border-left: 4px solid #0068b7;
            margin-bottom: 24px;
            margin-top: 48px
        }

        .section-heading:first-child {
            margin-top: 0
        }

        .contact-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 40px
        }

        .contact-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            transition: transform .2s
        }

        .contact-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, .08)
        }

        .contact-card__icon {
            font-size: 36px;
            margin-bottom: 12px
        }

        .contact-card__title {
            font-size: 18px;
            font-weight: 700;
            color: #0068b7;
            margin-bottom: 8px
        }

        .contact-card__value {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px
        }

        .contact-card__desc {
            font-size: 13px;
            color: #666
        }

        .form-group {
            margin-bottom: 24px
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333
        }

        .form-label .required {
            color: #e74c3c;
            font-size: 12px;
            margin-left: 4px
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color .2s;
            box-sizing: border-box
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            border-color: #0068b7;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 104, 183, .1)
        }

        .form-textarea {
            min-height: 150px;
            resize: vertical
        }

        .form-submit {
            display: inline-block;
            background: #0068b7;
            color: #fff;
            border: none;
            padding: 14px 48px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s
        }

        .form-submit:hover {
            background: #004a82;
            transform: translateY(-2px)
        }

        .proto-footer {
            background: #f5f5f5;
            margin-top: 80px
        }

        .proto-footer__inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center
        }

        .proto-footer__bottom {
            background: #333;
            padding: 16px;
            text-align: center;
            font-size: 12px;
            color: #999
        }

        @media(max-width:768px) {
            .contact-methods {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <div class="prototype-badge">⚠ デザインプロトタイプ</div>
    <header class="proto-header">
        <div class="proto-header__inner"><a href="index.html" class="proto-header__logo">☆ 房州ガス株式会社</a>
            <nav class="proto-header__nav"><a href="index.html">トップ</a><a href="gas-application.html">ガスのご利用</a><a
                    href="gas-price.html">ガス料金</a><a href="safety.html">安全</a><a href="corporate-service.html">法人向け</a>
            </nav>
        </div>
    </header>
    <div class="breadcrumb"><a href="index.html">房州ガス(株)</a> &gt; <strong>お問い合わせ</strong></div>
    <div class="page-title-area">
        <h1>お問い合わせ</h1>
    </div>
    <div class="content-area">
        <div class="contact-methods">
            <div class="contact-card">
                <div class="contact-card__icon">📞</div>
                <div class="contact-card__title">お電話でのお問い合わせ</div>
                <div class="contact-card__value">0470-22-2251</div>
                <div class="contact-card__desc">平日・土曜 8:00〜17:00</div>
            </div>
            <div class="contact-card">
                <div class="contact-card__icon">✉️</div>
                <div class="contact-card__title">フォームでのお問い合わせ</div>
                <div class="contact-card__value" style="font-size:16px;">下記フォームよりどうぞ</div>
                <div class="contact-card__desc">24時間受付（返信は営業時間内）</div>
            </div>
        </div>
        <h2 class="section-heading">お問い合わせフォーム</h2>
        <form style="max-width:700px">
            <div class="form-group"><label class="form-label">お名前<span class="required">必須</span></label><input
                    type="text" class="form-input" placeholder="房州 太郎"></div>
            <div class="form-group"><label class="form-label">メールアドレス<span class="required">必須</span></label><input
                    type="email" class="form-input" placeholder="example@email.com"></div>
            <div class="form-group"><label class="form-label">お電話番号</label><input type="tel" class="form-input"
                    placeholder="0470-00-0000"></div>
            <div class="form-group"><label class="form-label">お問い合わせ種別<span class="required">必須</span></label><select
                    class="form-select">
                    <option>選択してください</option>
                    <option>ガスの開栓・閉栓</option>
                    <option>ガス料金</option>
                    <option>ガス機器</option>
                    <option>工事・修理</option>
                    <option>採用</option>
                    <option>その他</option>
                </select></div>
            <div class="form-group"><label class="form-label">お問い合わせ内容<span class="required">必須</span></label><textarea
                    class="form-textarea" placeholder="お問い合わせ内容をご記入ください"></textarea></div>
            <div style="text-align:center;margin-top:32px"><button type="button" class="form-submit">送信する</button></div>
        </form>
    </div>
    <footer class="proto-footer">
        <div class="proto-footer__inner">
            <p style="font-size:24px;font-weight:700;color:#0068b7;">📞 0470-22-2251</p>
        </div>
        <div class="proto-footer__bottom">© BoushuGas.co.jp</div>
    </footer>
<script src="js/nav.js"></script></body>

</html>
